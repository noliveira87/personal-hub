<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 430) rotate(90) scale(360 420)">
      <stop offset="0" stop-color="#FFE9B0" stop-opacity="0.38"/>
      <stop offset="0.58" stop-color="#F4D27A" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="220" y1="250" x2="780" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF3C4"/>
      <stop offset="0.45" stop-color="#F2D47D"/>
      <stop offset="1" stop-color="#C79B34"/>
    </linearGradient>
    <filter id="softGlow" x="120" y="140" width="784" height="744" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="26" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.98 0 1 0 0 0.88 0 0 1 0 0.60 0 0 0 0.55 0"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="#000000"/>
  <rect width="1024" height="1024" rx="220" fill="url(#glow)"/>

  <g filter="url(#softGlow)">
    <text x="512" y="500" text-anchor="middle" fill="#F8E0A0" font-size="330" font-weight="700" font-family="Georgia, 'Times New Roman', serif">D12</text>
  </g>

  <text x="512" y="500" text-anchor="middle" fill="url(#gold)" font-size="330" font-weight="700" font-family="Georgia, 'Times New Roman', serif">D12</text>

  <rect x="258" y="612" width="508" height="112" rx="56" fill="#0A0A0A" stroke="#E2BE63" stroke-width="4"/>
  <text x="512" y="686" text-anchor="middle" fill="url(#gold)" font-size="88" font-weight="700" letter-spacing="10" font-family="Arial, Helvetica, sans-serif">HUB</text>
</svg>
